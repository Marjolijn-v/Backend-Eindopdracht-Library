spring.application.name=EindopdrachtBackendLibrary

PSQL_DATABASENAME = eindopdrachtbackendlibrary
PSQL_USERNAME=postgres
PSQL_USERPASSWORD=password

#Database url, username en password
spring.datasource.url=jdbc:postgresql://localhost:5432/${PSQL_DATABASENAME}
spring.datasource.username=${PSQL_USERNAME}
spring.datasource.password=${PSQL_USERPASSWORD}

#Jpa instellingen
spring.jpa.show-sql=true

#Genereer database structuur
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.database=postgresql
spring.sql.init.platform=postgres

# data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect



